services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    volumes:
      - ./data/config:/config
      - cache:/cache
      - ./data/media:/media
    restart: 'unless-stopped'
    environment:
      - JELLYFIN_PublishedServerUrl=https://music.manuelselch.de
    networks:
      - proxynet

  metube:
    image: ghcr.io/alexta69/metube
    container_name: metube
    user: 1000:1000
    restart: unless-stopped
    networks:
      - proxynet
    volumes:
      - ./data/media/MeTube:/downloads

networks:
  proxynet:
    name: proxynet
    external: true

volumes:
  cache:
